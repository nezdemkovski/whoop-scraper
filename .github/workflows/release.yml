name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nezdemkovski/whoop-scraper
  CHART_REGISTRY: oci://ghcr.io/nezdemkovski/charts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          perl -0pi -e "s/^version: .*/version: ${VERSION}/m; s/^appVersion: .*/appVersion: \"${VERSION}\"/m" charts/whoop-scraper/Chart.yaml
          perl -0pi -e "s/tag: \"[^\"]+\"/tag: \"${VERSION}\"/" charts/whoop-scraper/values.yaml
          helm lint charts/whoop-scraper
          helm package charts/whoop-scraper --destination dist

      - name: Push chart
        run: |
          helm push "dist/whoop-scraper-${{ steps.version.outputs.version }}.tgz" "${{ env.CHART_REGISTRY }}"
