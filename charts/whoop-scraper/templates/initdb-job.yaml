{{- if .Values.initDb.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "whoop-scraper.fullname" . }}-init-db
  labels:
    {{- include "whoop-scraper.labels" . | nindent 4 }}
  {{- with .Values.initDb.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.initDb.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "whoop-scraper.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "whoop-scraper.serviceAccountName" . }}
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - init-db
          env:
            {{- include "whoop-scraper.env" . | nindent 12 }}
          {{- if or .Values.secret.enabled .Values.envFrom }}
          envFrom:
            {{- if .Values.secret.enabled }}
            - secretRef:
                name: {{ include "whoop-scraper.secretName" . }}
            {{- end }}
            {{- with .Values.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
